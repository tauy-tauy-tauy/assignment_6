{% extends 'albums/base.html' %}
{% block content %}
<div class="d-flex justify-content-between align-items-center mb-3">
  <h1>Albums</h1>
  {% if user.is_authenticated %}
    <a class="btn btn-primary" href="{% url 'albums:create' %}">New Album</a>
  {% endif %}
</div>
<div class="row">
  {% for album in albums %}
    <div class="col-md-4">
      <div class="card mb-3">
        <div class="card-body">
          <h5 class="card-title"><a href="{% url 'albums:detail' album.pk %}">{{ album.title }}</a></h5>
          <p class="card-text">{{ album.description|truncatewords:20 }}</p>
        </div>
      </div>
    </div>
  {% empty %}
    <p>No albums yet.</p>
  {% endfor %}
</div>
{% endblock %}
