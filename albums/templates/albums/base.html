{% load static %}
<!doctype html>
<html>
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Photo Album</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
    <link rel="stylesheet" href="{% static 'css/style.css' %}">
  </head>
  <body>
    <nav class="navbar navbar-expand-lg navbar-light py-3 mb-4">
      <div class="container">
        <a class="navbar-brand d-flex align-items-center" href="{% url 'albums:list' %}">
          <i class="bi bi-camera-fill fs-3 text-primary me-2"></i>
          <span>PhotoFlow</span>
        </a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navMenu" aria-controls="navMenu" aria-expanded="false" aria-label="Toggle navigation">
          <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navMenu">
          <ul class="navbar-nav me-auto mb-2 mb-lg-0">
            <li class="nav-item">
              <a class="nav-link" href="{% url 'albums:list' %}">Home</a>
            </li>
            <li class="nav-item">
              <a class="nav-link" href="{% url 'albums:list' %}">Albums</a>
            </li>
          </ul>
          <div class="d-flex align-items-center gap-2">
            {% if user.is_authenticated %}
              <a class="btn btn-outline-primary btn-sm" href="{% url 'albums:create' %}"><i class="bi bi-plus-lg me-1"></i>Create Album</a>
              <form method="post" action="{% url 'logout' %}" class="d-inline">
                {% csrf_token %}
                <button type="submit" class="btn btn-primary btn-sm">Logout</button>
              </form>
            {% else %}
              <a class="btn btn-primary btn-sm" href="{% url 'login' %}">Login</a>
            {% endif %}
          </div>
        </div>
      </div>
    </nav>
    <main class="container">
      {% block content %}{% endblock %}
    </main>
    <footer>
      <small>Designed for clean photo browsing with a modern interface.</small>
    </footer>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  </body>
</html>
