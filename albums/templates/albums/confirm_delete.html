{% extends 'albums/base.html' %}
{% block content %}
<div class="form-panel mx-auto" style="max-width: 640px;">
  <div class="mb-4 text-center">
    <p class="text-uppercase text-primary fw-semibold mb-2">Confirm deletion</p>
    <h1 class="h4 mb-2">Delete this item?</h1>
    <p class="text-muted">This action cannot be undone. Please confirm that you want to remove this item from the gallery.</p>
  </div>
  <div class="mb-4 p-4 rounded-4 bg-white border">
    <p class="mb-0"><strong>Item:</strong> {{ object }}</p>
  </div>
  <form method="post" class="d-flex flex-column flex-sm-row gap-3 justify-content-center">
    {% csrf_token %}
    <button class="btn btn-danger btn-lg" type="submit">Yes, delete</button>
    <a class="btn btn-outline-secondary btn-lg" href="javascript:history.back()">Cancel</a>
  </form>
</div>
{% endblock %}
